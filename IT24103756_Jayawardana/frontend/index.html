<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base FAQ Management</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">Uni Guide AI</p>
          <h1>Knowledge Base FAQ Management</h1>
          <p class="subtitle">Search and review support FAQs used by the student guidance knowledge base.</p>
        </div>
        <div class="counter">
          <span id="faqCount">0</span>
          <small>FAQs</small>
        </div>
      </section>

      <section class="panel">
        <label for="searchInput">Search FAQ library</label>
        <input id="searchInput" type="search" placeholder="Search by question, category, answer, or tag" />
      </section>

      <section class="panel">
        <form id="faqForm" class="faq-form">
          <input id="faqId" type="hidden" />
          <div class="form-grid">
            <label>
              Category
              <input id="categoryInput" required placeholder="Registration, Exams, Support" />
            </label>
            <label>
              Status
              <select id="statusInput">
                <option value="published">Published</option>
                <option value="draft">Draft</option>
              </select>
            </label>
          </div>
          <label>
            Question
            <input id="questionInput" required placeholder="Question students commonly ask" />
          </label>
          <label>
            Answer
            <textarea id="answerInput" required placeholder="Clear answer for the knowledge base"></textarea>
          </label>
          <label>
            Tags
            <input id="tagsInput" placeholder="registration, portal, payment" />
          </label>
          <div class="actions">
            <button type="button" class="secondary" id="clearButton">Clear</button>
            <button type="submit" id="saveButton">Add FAQ</button>
          </div>
        </form>
      </section>

      <p id="feedback" class="feedback" role="status"></p>
      <section id="faqList" class="faq-list" aria-live="polite"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
